services:
  mysql:
    image: mysql:8.4
    container_name: fairy-castle-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fairy_castle
      MYSQL_USER: fairy
      MYSQL_PASSWORD: fairy
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: fairy-castle-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
    container_name: fairy-castle-backend
    env_file:
      - ../backend/.env.example
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
    container_name: fairy-castle-frontend
    env_file:
      - ../frontend/.env.example
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mysql_data:
