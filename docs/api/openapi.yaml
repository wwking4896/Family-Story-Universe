openapi: 3.0.3
info:
  title: Fairy Castle MVP API
  version: 0.1.0
  description: |
    童話城堡 Fairy Castle MVP REST API 規格。
    目前 backend 以 in-memory store 實作，供前端串接與 E2E 驗證。
servers:
  - url: http://localhost:8080/api/v1
    description: Local backend
security:
  - bearerAuth: []
paths:
  /healthz:
    get:
      summary: API health check
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /auth/register:
    post:
      summary: Register user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /auth/login:
    post:
      summary: Login user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/logout:
    post:
      summary: Logout current user
      responses:
        '200':
          description: Logout accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /auth/me:
    get:
      summary: Get current user profile and families
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                type: object
                required: [user, families]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  families:
                    type: array
                    items:
                      $ref: '#/components/schemas/Family'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /families:
    post:
      summary: Create family
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FamilyCreateRequest'
      responses:
        '201':
          description: Family created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Family'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /families/me:
    get:
      summary: List current user's families
      responses:
        '200':
          description: Family list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FamilyListResponse'
  /families/{familyId}:
    patch:
      summary: Update family name
      parameters:
        - $ref: '#/components/parameters/FamilyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FamilyCreateRequest'
      responses:
        '200':
          description: Family updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Family'
        '403':
          $ref: '#/components/responses/Forbidden'
  /children:
    get:
      summary: List children by family
      parameters:
        - $ref: '#/components/parameters/FamilyIdQuery'
      responses:
        '200':
          description: Children list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChildListResponse'
    post:
      summary: Create child
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChildCreateRequest'
      responses:
        '201':
          description: Child created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Child'
  /children/{childId}:
    get:
      summary: Get child
      parameters:
        - $ref: '#/components/parameters/ChildId'
      responses:
        '200':
          description: Child detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Child'
    patch:
      summary: Update child
      parameters:
        - $ref: '#/components/parameters/ChildId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChildPatchRequest'
      responses:
        '200':
          description: Child updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Child'
    delete:
      summary: Soft delete child
      parameters:
        - $ref: '#/components/parameters/ChildId'
      responses:
        '200':
          description: Child deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /characters:
    get:
      summary: List characters by family
      parameters:
        - $ref: '#/components/parameters/FamilyIdQuery'
      responses:
        '200':
          description: Characters list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CharacterListResponse'
    post:
      summary: Create character
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CharacterCreateRequest'
      responses:
        '201':
          description: Character created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Character'
  /characters/{characterId}:
    get:
      summary: Get character
      parameters:
        - $ref: '#/components/parameters/CharacterId'
      responses:
        '200':
          description: Character detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Character'
    patch:
      summary: Update character
      parameters:
        - $ref: '#/components/parameters/CharacterId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CharacterPatchRequest'
      responses:
        '200':
          description: Character updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Character'
    delete:
      summary: Soft delete character
      parameters:
        - $ref: '#/components/parameters/CharacterId'
      responses:
        '200':
          description: Character deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /regions:
    get:
      summary: List MVP regions
      security: []
      responses:
        '200':
          description: Regions list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegionListResponse'
  /stories/generate:
    post:
      summary: Generate story with MVP mock engine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoryGenerateRequest'
      responses:
        '201':
          description: Story generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoryGenerateResult'
        '400':
          $ref: '#/components/responses/BadRequest'
  /stories:
    get:
      summary: List stories by family
      parameters:
        - $ref: '#/components/parameters/FamilyIdQuery'
      responses:
        '200':
          description: Stories list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoryListResponse'
  /stories/{storyId}:
    get:
      summary: Get story
      parameters:
        - $ref: '#/components/parameters/StoryId'
      responses:
        '200':
          description: Story detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Story'
    patch:
      summary: Update story metadata
      parameters:
        - $ref: '#/components/parameters/StoryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoryPatchRequest'
      responses:
        '200':
          description: Story updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Story'
    delete:
      summary: Soft delete story
      parameters:
        - $ref: '#/components/parameters/StoryId'
      responses:
        '200':
          description: Story deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /timebook:
    get:
      summary: Get timebook grouped by year and month
      parameters:
        - $ref: '#/components/parameters/FamilyIdQuery'
      responses:
        '200':
          description: Timebook
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimebookResponse'
  /timebook/{year}:
    get:
      summary: Get timebook for specific year
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
            example: 2026
        - $ref: '#/components/parameters/FamilyIdQuery'
      responses:
        '200':
          description: Year timebook
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimebookResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: MVP-HMAC
  parameters:
    FamilyId:
      name: familyId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    FamilyIdQuery:
      name: family_id
      in: query
      required: true
      schema:
        type: integer
        format: int64
    ChildId:
      name: childId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    CharacterId:
      name: characterId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    StoryId:
      name: storyId
      in: path
      required: true
      schema:
        type: integer
        format: int64
  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    HealthResponse:
      type: object
      required: [status, service, version, started_at]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: fairy-castle-api
        version:
          type: string
          example: 0.1.0
        started_at:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, details]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
    StatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: deleted
    RegisterRequest:
      type: object
      required: [email, password, display_name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        display_name:
          type: string
          example: 小雨爸爸
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthResult:
      type: object
      required: [user, access_token, expires_in]
      properties:
        user:
          $ref: '#/components/schemas/User'
        access_token:
          type: string
        expires_in:
          type: integer
          example: 3600
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        display_name:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    FamilyCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: 小雨的童話城堡
    Family:
      allOf:
        - $ref: '#/components/schemas/FamilyCreateRequest'
        - type: object
          properties:
            id:
              type: integer
              format: int64
            owner_user_id:
              type: integer
              format: int64
            plan_type:
              type: string
              example: free
    FamilyListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Family'
    ChildCreateRequest:
      type: object
      required: [family_id, name, nickname]
      properties:
        family_id:
          type: integer
          format: int64
        name:
          type: string
          example: 小雨
        nickname:
          type: string
          example: 雨雨
        birth_date:
          type: string
          example: '2022-05-01'
        gender_optional:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
    ChildPatchRequest:
      allOf:
        - $ref: '#/components/schemas/ChildCreateRequest'
    Child:
      allOf:
        - $ref: '#/components/schemas/ChildCreateRequest'
        - type: object
          properties:
            id:
              type: integer
              format: int64
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    ChildListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Child'
    CharacterCreateRequest:
      type: object
      required: [family_id, child_id, real_name, story_name, role_type, magic_power]
      properties:
        family_id:
          type: integer
          format: int64
        child_id:
          type: integer
          format: int64
        real_name:
          type: string
          example: 小雨
        story_name:
          type: string
          example: 星光小魔女
        role_type:
          type: string
          example: 月光魔法學徒
        personality_traits:
          type: array
          items:
            type: string
        likes:
          type: array
          items:
            type: string
        fears:
          type: array
          items:
            type: string
        magic_power:
          type: string
        avatar_url:
          type: string
          nullable: true
    CharacterPatchRequest:
      allOf:
        - $ref: '#/components/schemas/CharacterCreateRequest'
    Character:
      allOf:
        - $ref: '#/components/schemas/CharacterCreateRequest'
        - type: object
          properties:
            id:
              type: integer
              format: int64
            level:
              type: integer
            exp:
              type: integer
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    CharacterListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Character'
    Region:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        theme:
          type: string
        unlock_level:
          type: integer
        sort_order:
          type: integer
        is_active:
          type: boolean
    RegionListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Region'
    StoryGenerateRequest:
      type: object
      required: [family_id, child_id, main_character_id, region_id, theme, story_length]
      properties:
        family_id:
          type: integer
          format: int64
        child_id:
          type: integer
          format: int64
        main_character_id:
          type: integer
          format: int64
        region_id:
          type: integer
          format: int64
        theme:
          type: string
          enum: [勇氣, 分享, 禮貌, 責任, 同理心, 情緒管理, 睡前放鬆, 親子陪伴]
        story_length:
          type: string
          enum: [3_min, 5_min, 10_min]
        real_life_event_optional:
          type: string
        tone:
          type: string
          enum: [溫柔, 奇幻, 搞笑, 睡前安撫, 冒險]
        language:
          type: string
          enum: [zh-TW]
    StoryGenerateResult:
      type: object
      properties:
        job_id:
          type: integer
          format: int64
        status:
          type: string
          example: completed
        story:
          $ref: '#/components/schemas/Story'
    StoryPatchRequest:
      type: object
      properties:
        title:
          type: string
        summary:
          type: string
        status:
          type: string
    Story:
      type: object
      properties:
        id:
          type: integer
          format: int64
        family_id:
          type: integer
          format: int64
        child_id:
          type: integer
          format: int64
        main_character_id:
          type: integer
          format: int64
        region_id:
          type: integer
          format: int64
        title:
          type: string
        summary:
          type: string
        content:
          type: string
        theme:
          type: string
        story_length:
          type: string
        real_life_event:
          type: string
        tone:
          type: string
        language:
          type: string
        ai_provider:
          type: string
        ai_model:
          type: string
        status:
          type: string
        safety_check:
          type: object
          additionalProperties:
            type: boolean
        memory_tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    StoryListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Story'
    TimebookResponse:
      type: object
      properties:
        years:
          type: array
          items:
            type: object
            properties:
              year:
                type: integer
              months:
                type: array
                items:
                  type: object
                  properties:
                    month:
                      type: integer
                    stories:
                      type: array
                      items:
                        $ref: '#/components/schemas/Story'
